<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottle Counter</title>
    <link rel="icon" type="image/x-icon" href="./media/bottle-cap-svgrepo-com.svg">
    <link rel="stylesheet" href="./terminal.css">
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>
<main class="app-shell">
    <header class="app-header">
        <h1>Bottle Counter</h1>
    </header>

    <section aria-labelledby="terminal-title">
        <fieldset class="terminal-panel">
            <legend id="terminal-title">Terminal Session</legend>

            <div id="terminalOutput" class="terminal-output" aria-live="polite">
                <p>&gt; Bottle Counter terminal initialized.</p>
                <p>&gt; Type <code>help</code> to list commands.</p>
                <p>&gt; Session status: guest</p>
            </div>

            <form autocomplete="off" id="terminalForm" class="terminal-form">
                <label for="terminalInput">Enter command</label>
                <div class="terminal-entry">
                    <span class="prompt" aria-hidden="true">user@bottle-counter:~$</span>
                    <input id="terminalInput" name="command" type="text" placeholder="help"
                        aria-label="Terminal command input">
                </div>
                <button>Run command</button>
            </form>
        </fieldset>

        <div id="loginModal" class="modal" aria-hidden="true">
            <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
                <h2 id="loginModalTitle">Login</h2>
                <form id="loginForm" class="modal-form" autocomplete="on">
                    <label for="loginUsername">Username</label>
                    <input id="loginUsername" name="username" type="text" required>

                    <label for="loginPassword">Password</label>
                    <input id="loginPassword" name="password" type="password" required>

                    <div class="modal-actions">
                        <button type="submit">Login</button>
                        <button type="button" id="loginCancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
</main>
</body>

</html>
